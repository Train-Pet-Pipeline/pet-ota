name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  repository_dispatch:
    types: [schema-updated]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      PET_ALLOW_MISSING_SDK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Step 1 — install pet-schema (peer-dep, matrix 2026.10)
        run: pip install 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v3.2.1'

      - name: Step 2 — install pet-infra (peer-dep, matrix 2026.10)
        run: pip install 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.6.0'

      - name: Step 3 — install pet-ota editable, no-deps
        run: pip install -e . --no-deps

      - name: Step 4 — re-resolve dev extras
        run: pip install -e ".[dev]"

      - name: Step 5 — assert peer-dep versions (§11.4)
        run: |
          python -c "import importlib.metadata as m; v=m.version('pet-schema'); assert v.startswith('3.'), f'unexpected pet_schema version {v}'"
          python -c "import importlib.metadata as m; v=m.version('pet-infra'); assert v.startswith('2.6'), f'unexpected pet_infra version {v}'"

      - name: Lint
        run: ruff check src/ tests/ && mypy src/

      - name: Test
        run: pytest tests/ -v --tb=short
