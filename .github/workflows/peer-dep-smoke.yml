name: peer-dep-smoke

on:
  pull_request:
    branches: [dev, main]

jobs:
  install-order-smoke:
    runs-on: ubuntu-latest
    env:
      PET_ALLOW_MISSING_SDK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Step 1 — install pet-infra (peer-dep, Phase 4 v2.5.0-rc1)
        run: pip install 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.5.0-rc1'

      - name: Step 2 — install pet-ota editable, no-deps
        run: pip install -e . --no-deps

      - name: Step 3 — re-resolve dev extras
        run: pip install -e ".[dev]"

      - name: Step 4 — assert peer-dep version (§11.4)
        run: python -c "import importlib.metadata; v=importlib.metadata.version('pet-infra'); assert v.startswith('2.5'), f'unexpected pet_infra version {v}'"

      - name: Smoke — register_all populates OTA registry
        run: |
          python -c "
          from pet_ota.plugins._register import register_all
          register_all()
          from pet_infra.registry import OTA
          got = set(OTA.module_dict.keys())
          assert 'local_backend' in got, f'local_backend missing; got OTA: {got}'
          print(f'OK OTA registered: {sorted(got)}')"

      - name: Smoke — pet_ota entry-point discoverable
        run: |
          python -c "
          from importlib.metadata import entry_points
          eps = entry_points(group='pet_infra.plugins')
          names = {ep.name for ep in eps}
          assert 'pet_ota' in names, f'pet_ota entry-point missing; got: {names}'
          print(f'OK pet_ota entry-point discoverable via pet_infra.plugins')"
